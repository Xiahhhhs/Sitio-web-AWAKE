<main class="max-w-4xl mx-auto mt-10 bg-white p-6 rounded shadow">
<h1 class="text-2xl font-bold mb-6">Tu carrito</h1>


<div id="cart-items"></div>


<div class="flex justify-between items-center mt-8">
<p class="text-xl font-bold">Total: €<span id="cart-total">0.00</span></p>


<a href="pagar.html" class="bg-green-600 text-white px-6 py-2 rounded">
Pagar
</a>
</div>
</main>

<script>
    const menuBtn = document.getElementById("menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");
    const closeBtn = document.getElementById("close-btn");

    menuBtn.addEventListener("click", () => {
        mobileMenu.classList.remove("translate-x-full");
    });

    closeBtn.addEventListener("click", () => {
        mobileMenu.classList.add("translate-x-full");
    });

    const langBtn = document.getElementById("language-btn");
    const langMenu = document.getElementById("language-menu");
    const currentFlag = document.getElementById("current-flag");
    const currentLang = document.getElementById("current-lang");

    langBtn.addEventListener("click", () => {
        langMenu.classList.toggle("hidden");
    });

    function changeLanguage(lang, flagSrc) {
        currentFlag.src = flagSrc;
        currentLang.textContent = lang.toUpperCase();

        if(typeof setLanguage === "function"){
            setLanguage(lang);
        }

        langMenu.classList.add("hidden");
    }

    document.addEventListener("click", function(event) {
        if (!langBtn.contains(event.target) && !langMenu.contains(event.target)) {
            langMenu.classList.add("hidden");
        }
    });
</script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];


function saveCart() {
localStorage.setItem("cart", JSON.stringify(cart));
}


function renderCart() {
const container = document.getElementById("cart-items");
const totalEl = document.getElementById("cart-total");
container.innerHTML = "";


if (cart.length === 0) {
container.innerHTML = "<p class='text-gray-500'>El carrito está vacío</p>";
totalEl.textContent = "0.00";
return;
}


let total = 0;


cart.forEach((item, index) => {
const price = Number(item.price) || 0;
const qty = Number(item.quantity) || 1;
const subtotal = price * qty;
total += subtotal;


container.innerHTML += `
<div class="flex justify-between items-center border-b py-4">
<div>
<h3 class="font-semibold">${item.name}</h3>
<p>€${price.toFixed(2)}</p>
</div>


<div class="flex items-center gap-2">
<button onclick="changeQty(${index}, -1)" class="px-2 bg-gray-300">−</button>
<span>${qty}</span>
<button onclick="changeQty(${index}, 1)" class="px-2 bg-gray-300">+</button>
</div>


<div class="text-right">
<p class="font-bold">€${subtotal.toFixed(2)}</p>
<button onclick="removeItem(${index})" class="text-red-500 text-sm">Eliminar</button>
</div>
</div>
`;
});


totalEl.textContent = total.toFixed(2);
}


function changeQty(index, amount) {
cart[index].quantity += amount;
if (cart[index].quantity <= 0) {
cart.splice(index, 1);
}
saveCart();
renderCart();
}


function removeItem(index) {
cart.splice(index, 1);
saveCart();
renderCart();
}


renderCart();
</script>
